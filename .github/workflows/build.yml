name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pymupdf pywebview pyinstaller

      - name: Build
        run: pyinstaller redact.spec

      - name: Package
        run: Compress-Archive -Path dist\redact -DestinationPath redact-${{ github.ref_name }}-windows.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: redact-${{ github.ref_name }}-windows.zip
